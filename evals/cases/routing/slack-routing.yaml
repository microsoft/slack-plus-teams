# Slack routing test cases

- name: "Slack Bolt app setup"
  input: "I want to create a new Slack app using @slack/bolt with Socket Mode"
  expectedDomain: slack
  expectedClusters: ["Bolt Foundations", "Socket Mode"]
  expectedExperts: ["runtime.bolt-foundations-ts.md", "runtime.ack-rules-ts.md", "runtime.socket-mode-ts.md"]
  tags: [routing, slack]

