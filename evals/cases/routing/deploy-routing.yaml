# Deploy routing test cases

- name: "Deploy Teams bot to Azure App Service"
  input: "Deploy my Teams bot to Azure App Service with az login and Azure Bot registration"
  expectedDomain: deploy
  expectedClusters: ["Deploy to Azure"]
  expectedExperts: ["azure-bot-deploy-ts.md"]
  tags: [routing, deploy]

